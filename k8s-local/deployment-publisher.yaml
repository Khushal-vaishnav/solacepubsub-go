apiVersion: apps/v1
kind: Deployment
metadata:
  name: solace-producer
  namespace: solace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: solace-producer
  template:
    metadata:
      labels:
        app: solace-producer
    spec:
      containers:
      - name: producer
        image: solace-producer:local
        envFrom:
        - configMapRef:
            name: solace-app-config
        - secretRef:
            name: solace-app-secret
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

