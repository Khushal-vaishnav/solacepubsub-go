apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: solace-consumer-hpa
  namespace: solace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: solace-consumer
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Pods
    pods:
      metric:
        name: solace_message_lag
      target:
        type: AverageValue
        averageValue: "100"

